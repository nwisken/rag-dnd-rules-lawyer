services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ruleslawyer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ruleslawyer}
      POSTGRES_DB: ${POSTGRES_DB:-ruleslawyer}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ruleslawyer} -d ${POSTGRES_DB:-ruleslawyer}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
